public:
  bind:
    address: '::'
  metrics:
    prometheus:
      enabled: false
      endpointEnabled: false
    influx:
      enabled: false
      timeoutMilliseconds: 1000
      intervalSeconds: 15
  ssl:
    isSecure: false
  services:
    bitbucket:
      authorizedOrigins: 'https://bitbucket.org'
    github:
      baseUri: 'https://api.github.com'
      debug:
        enabled: false
        intervalSeconds: 200
      restApiVersion: '2026-03-10'
    obs:
      authorizedOrigins: 'https://api.opensuse.org'
    pypi:
      baseUri: 'https://pypi.org'
    weblate:
      authorizedOrigins: 'https://hosted.weblate.org'
    trace: false
  cacheHeaders:
    defaultCacheLengthSeconds: 120
  handleInternalErrors: true
  fetchLimitBytes: 10485760
  userAgentBase: 'shields (self-hosted)'
  requestTimeoutSeconds: 120
  requestTimeoutMaxAgeSeconds: 30
  allowUnsecuredEndpointRequests: false
  requireCloudflare: false
private: {}
